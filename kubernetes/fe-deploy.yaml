apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-devops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 398980856369.dkr.ecr.us-east-1.amazonaws.com/frontend:latest

        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
