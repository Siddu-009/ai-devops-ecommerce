apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: ai-devops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-engine

  template:
    metadata:
      labels:
        app: ai-engine

    spec:
      containers:
      - name: ai-engine

        image: 398980856369.dkr.ecr.us-east-1.amazonaws.com/ai-engine:latest

        ports:
        - containerPort: 5000

        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: OPENAI_API_KEY

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
